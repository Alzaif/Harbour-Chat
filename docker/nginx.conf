map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    location = /api/ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Harbour-Proxy-Token $http_x_harbour_proxy_token;
        proxy_set_header X-Harbour-User-Id $http_x_harbour_user_id;
        proxy_set_header X-Harbour-Email $http_x_harbour_email;
        proxy_set_header X-Harbour-Scopes $http_x_harbour_scopes;
        proxy_set_header X-Harbour-Display-Name $http_x_harbour_display_name;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Force https at app boundary; websocket upgrades can miss forwarded proto.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Harbour-Proxy-Token $http_x_harbour_proxy_token;
        proxy_set_header X-Harbour-User-Id $http_x_harbour_user_id;
        proxy_set_header X-Harbour-Email $http_x_harbour_email;
        proxy_set_header X-Harbour-Scopes $http_x_harbour_scopes;
        proxy_set_header X-Harbour-Display-Name $http_x_harbour_display_name;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    location /version {
        proxy_pass http://127.0.0.1:3000;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
